---

- name: Block to enable repositories
  when: ha_cluster_enable_repos
  block:

    - name: Find platform/version specific tasks to enable repositories
      ansible.builtin.set_fact:
        __ha_cluster_enable_repo_tasks_file:
          "{{ __ha_cluster_enable_repo_tasks_file_candidate }}"
      loop:
        - "{{ ansible_facts['os_family'] }}.yml"
        - "{{ ansible_facts['distribution'] }}.yml"
        - >-
          {{ ansible_facts['distribution'] ~ '_' ~
          ansible_facts['distribution_major_version'] }}.yml
        - >-
          {{ ansible_facts['distribution'] ~ '_' ~
          ansible_facts['distribution_version'] }}.yml
      loop_control:
        loop_var: task_file_item
      vars:
        __ha_cluster_enable_repo_tasks_file_candidate:
          "{{ role_path }}/tasks/enable-repositories/{{ task_file_item }}"
      when:
        - __ha_cluster_enable_repo_tasks_file_candidate is file

    - name: Run platform/version specific tasks to enable repositories
      ansible.builtin.include_tasks:
        file: "{{ __ha_cluster_enable_repo_tasks_file }}"
      when:
        - __ha_cluster_enable_repo_tasks_file is defined
        - not __ha_cluster_is_ostree | d(false)


- name: Install role essential packages
  ansible.builtin.package:
    name: "{{
      __ha_cluster_role_essential_packages
      +
      ha_cluster_extra_packages }}"
    state: "{{ 'latest' if ha_cluster_use_latest_packages else 'present' }}"
    use: "{{ (__ha_cluster_is_ostree | d(false)) |
             ternary('ansible.posix.rhel_rpm_ostree', omit) }}"
